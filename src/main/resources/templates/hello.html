<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>static page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 420px;
        }

        h1 {
            margin-bottom: 12px;
            font-size: 32px;
            color: #222;
        }

        p {
            margin-bottom: 24px;
            color: #555;
            font-size: 16px;
        }

        .button {
            display: inline-block;
            padding: 12px 20px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Static Page</h1>
    <p>Spring Boot 애플리케이션이 정상적으로 실행 중입니다.</p>
</div>
</body>
</html>
